services:
  api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PILLSCAN_ENVIRONMENT: production
      PILLSCAN_LOG_FORMAT: json
    ports:
      - "8000:8000"
    volumes:
      - pillscan-data:/app/.data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true

volumes:
  pillscan-data:
